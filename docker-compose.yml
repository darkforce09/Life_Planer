version: '3.8'

services:
  postgres:
    # Using ankane/pgvector which is the official recommended image for pgvector
    image: ankane/pgvector:latest
    container_name: life_planner_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: life_planner
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin", "-d", "life_planner"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-life_planner_backend:latest}
    container_name: life_planner_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://admin:password123@postgres:5432/life_planner
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      ENABLE_ORCHESTRATOR: ${ENABLE_ORCHESTRATOR:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    volumes:
      # Persist the on-disk knowledge base and scraped content.
      - kbdata:/root/Documents
    restart: unless-stopped

volumes:
  pgdata:
  kbdata:
